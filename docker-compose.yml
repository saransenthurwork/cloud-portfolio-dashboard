version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: nimbus-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nimbus_cloud

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: nimbus-backend
    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "5000:5000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nimbus_cloud
      JWT_SECRET: nimbus_cloud_2026_7A9xP2LmQ8vR5Ks1ZyE4NcW

  frontend:
    build:
      context: ./frontend

    container_name: nimbus-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "5173:5173"

volumes:
  postgres_data: