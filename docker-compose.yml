services:

  postgres:
    image: postgres:16

    container_name: nimbus-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nimbus_cloud

    expose:
      - "5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nimbus_cloud"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend

    container_name: nimbus-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    expose:
      - "5000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nimbus_cloud
      JWT_SECRET: nimbus_cloud_2026_7A9xP2LmQ8vR5Ks1ZyE4NcW

  frontend:
    build:
      context: ./frontend

    container_name: nimbus-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  prometheus:
    image: prom/prometheus:latest

    container_name: nimbus-prometheus

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana-oss:latest

    container_name: nimbus-grafana

    restart: unless-stopped

    depends_on:
      - prometheus

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data: